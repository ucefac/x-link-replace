<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Link Replace Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>X Link Replace</h1>
    <p class="description">Replace Twitter/X t.co short links with real URLs</p>

    <div class="settings">
      <div class="setting-item">
        <label for="tooltipEnabled">
          <input type="checkbox" id="tooltipEnabled">
          <span class="label-text">Show link URL tooltip on hover</span>
        </label>
        <p class="setting-description">Display native tooltip showing the actual href value when hovering over any link</p>
      </div>

      <div class="setting-item">
        <label for="linkReplaceEnabled">
          <input type="checkbox" id="linkReplaceEnabled">
          <span class="label-text">Replace t.co links on Twitter/X</span>
        </label>
        <p class="setting-description">Replace Twitter/X t.co short links with real URLs from link text</p>
      </div>
    </div>

    <div class="footer">
      <p>Version: <span id="version">1.0.1</span></p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
